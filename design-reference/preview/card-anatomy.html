<!DOCTYPE html>
<!-- @dsCard group="Components" name="Card Anatomy" subtitle="Top-bar feature card · gradient-bar-left section" viewport="700x230" -->
<html lang="en"><head><meta charset="UTF-8"><title>Card Anatomy</title><link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .tile {
    position: relative; padding: 24px;
    background: #0f1a30; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; overflow: hidden;
  }
  .tile.feature::before {
    content: ""; position: absolute; inset-inline: 0; top: 0; height: 2px;
    background: var(--spark-gradient);
  }
  .tile.left { padding-left: 36px; }
  .tile.left::before {
    content: ""; position: absolute; inset-block: 0; left: 0; width: 4px;
    border-radius: 2px;
    background: linear-gradient(to bottom, #ff6348, #FCA311, #F7B731);
  }
  .tile h4 { font-family: Montserrat; font-weight: 900; font-size: 18px; letter-spacing: -0.01em; margin: 0 0 6px; color: #eef0ff; }
  .tile p { color: rgba(238,240,255,0.60); font-size: 13px; line-height: 1.6; }
  .ic {
    width: 44px; height: 44px; border-radius: 14px;
    background: rgba(247,183,49,0.06); border: 1px solid rgba(247,183,49,0.30);
    display: flex; align-items: center; justify-content: center;
    color: #F7B731; box-shadow: 0 0 20px rgba(252,163,17,0.12);
    margin-bottom: 14px;
  }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="tile feature">
      <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div>
      <h4>Top-bar feature card</h4>
      <p>2px gradient bar across the top, navy fill, gold-tinted icon well.</p>
    </div>
    <div class="tile left">
      <h4>Gradient-bar-left section</h4>
      <p>4px vertical bar pinned to the left edge — used for major feature blocks &amp; About callouts.</p>
    </div>
  </div>
</div></body></html>
