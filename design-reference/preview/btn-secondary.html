<!DOCTYPE html>
<!-- @dsCard group="Components" name="Secondary &amp; Ghost Buttons" subtitle="Outline · ghost · inline gold link" viewport="700x160" -->
<html lang="en"><head><meta charset="UTF-8"><title>Buttons — Secondary &amp; Ghost</title><link rel="stylesheet" href="_base.css">
<style>
  .row { flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn-outline {
    background: rgba(255,255,255,0.05);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.20);
    font-family: Inter; font-weight: 900; font-size: 14px;
    padding: 16px 28px; border-radius: 16px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 12px;
  }
  .btn-outline:hover { border-color: rgba(247,183,49,0.45); background: rgba(255,255,255,0.08); }
  .free-tag {
    font-size: 10px; font-weight: 900; letter-spacing: 0.18em;
    background: var(--spark-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .btn-ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.20);
    color: var(--muted-text); font-weight: 900; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.20em;
    padding: 10px 18px; border-radius: 12px; cursor: pointer;
  }
  .btn-link { background: none; border: none; color: #F7B731; font-weight: 700; font-size: 14px; cursor: pointer; }
</style></head>
<body><div class="card">
  <div class="row">
    <button class="btn-outline">Browse Local Events <span class="free-tag">FREE</span></button>
    <button class="btn-ghost">Add to the team</button>
    <button class="btn-link">Compare in full flow →</button>
  </div>
  <div class="label" style="margin-top: 18px">Outline · Ghost (uppercase microcopy) · Inline gold link</div>
</div></body></html>
