<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Brand Palette" subtitle="Ignition Gold, Flame Red, Bright Orange, Deep Night" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand Palette</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#F7B731"></div><div class="name">Ignition Gold</div><div class="hex">#F7B731</div></div>
    <div class="swatch"><div class="chip" style="background:#ff6348"></div><div class="name">Flame Red</div><div class="hex">#FF6348</div></div>
    <div class="swatch"><div class="chip" style="background:#FCA311"></div><div class="name">Bright Orange</div><div class="hex">#FCA311</div></div>
    <div class="swatch"><div class="chip" style="background:#14213D"></div><div class="name">Deep Night</div><div class="hex">#14213D</div></div>
  </div>
</div>
</body>
</html>
