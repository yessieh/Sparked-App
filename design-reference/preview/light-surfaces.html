<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Light Surfaces" subtitle="Cool gray canvas, white card, subtle, pressed" viewport="700x190" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Light Mode Surfaces</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { background: #f4f5f8; color: #1c2840; }
  .card { background: #f4f5f8; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .swatch .chip { height: 72px; border: 1px solid rgba(28,40,64,0.08); }
  .swatch .name { color: #1c2840; }
  .swatch .hex { color: #7a849e; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#f4f5f8"></div><div class="name">Page bg</div><div class="hex">#F4F5F8</div></div>
    <div class="swatch"><div class="chip" style="background:#ffffff"></div><div class="name">Card / nav</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#eceef3"></div><div class="name">Subtle</div><div class="hex">#ECEEF3</div></div>
    <div class="swatch"><div class="chip" style="background:#e6e8ef"></div><div class="name">Pressed</div><div class="hex">#E6E8EF</div></div>
  </div>
</div>
</body>
</html>
