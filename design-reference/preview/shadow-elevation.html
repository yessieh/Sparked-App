<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Shadow &amp; Elevation" subtitle="Glow accent · CTA haze · elevated lift" viewport="700x210" -->
<html lang="en"><head><meta charset="UTF-8"><title>Shadow &amp; Elevation</title><link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .tile {
    height: 110px; border-radius: 24px;
    background: #0f1a30; border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-family: Inter; font-weight: 900; font-size: 11px; color: rgba(238,240,255,0.50);
    text-transform: uppercase; letter-spacing: 0.20em;
    text-align: center; padding: 0 14px;
  }
  .glow { box-shadow: 0 0 60px rgba(252, 163, 17, 0.12), 0 0 120px rgba(255, 99, 72, 0.06); }
  .cta { box-shadow: 0 6px 22px rgba(255,95,78,0.24); }
  .lift { box-shadow: 0 20px 50px rgba(0,0,0,0.30); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="tile glow">Glow accent<br><span style="opacity:.8">warm haze</span></div>
    <div class="tile cta">CTA shadow<br><span style="opacity:.8">coral haze</span></div>
    <div class="tile lift">Elevated<br><span style="opacity:.8">modal lift</span></div>
  </div>
</div></body></html>
