<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo &amp; Wordmark" subtitle="Twin-flames icon · gradient wordmark · app tile" viewport="700x160" -->
<html lang="en"><head><meta charset="UTF-8"><title>Logo &amp; Wordmark</title><link rel="stylesheet" href="_base.css">
<style>
  .row { gap: 28px; align-items: center; }
  .lockup { display: inline-flex; align-items: center; gap: 12px; }
  .word {
    font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 28px;
    letter-spacing: -0.01em; line-height: 1;
    background: var(--spark-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .word.light { background: none; -webkit-text-fill-color: #14213D; color: #14213D; }
  .light-bg { background: #f4f5f8; padding: 18px 22px; border-radius: 18px; display: inline-flex; align-items: center; gap: 12px; }
  img.icon { display:block; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="lockup">
      <img class="icon" src="../assets/sparked-icon.svg" alt="" width="34" height="46">
      <span class="word">Sparked</span>
    </div>
    <div class="light-bg">
      <img class="icon" src="../assets/sparked-icon.svg" alt="" width="34" height="46">
      <span class="word light">Sparked</span>
    </div>
    <img src="../assets/sparked-app-icon-1024.svg" alt="" width="68" height="68" style="border-radius:16px">
  </div>
  <div class="label" style="margin-top: 22px">Twin-flames icon · Wordmark Montserrat 900 (gradient on dark, navy on light) · App icon</div>
</div></body></html>
