const IntroNote = () => (
  <div className="note" data-screen-label="00 Read me first">
    <h2>The multi-CTA question - what I'd do for a first launch</h2>
    <p className="lead">
      You asked the right question. Today your landing is doing two jobs - pitching <strong>consumers</strong> to browse <em>and</em> pitching <strong>organizers</strong> to list. On desktop you have three viewports of room to share. On mobile you have one. You have to pick a side.
    </p>

    <h3>My recommendation <span className="tag tag-keep">DO THIS</span></h3>
    <p><strong>One front door, separate organizer page.</strong> Every successful events platform does it this way - Eventbrite, Meetup, Partiful, Resy, Luma. Your home page sells one audience; a dedicated page sells the other.</p>

    <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: '12px 14px', margin: '10px 0 14px' }}>
      <div style={{ fontWeight: 800, fontSize: 12, marginBottom: 4 }}>sparked.app  <span style={{ color: '#806a4e', fontWeight: 600 }}>(home)</span></div>
      <p style={{ margin: 0 }}><strong>Audience:</strong> consumers. <strong>One primary CTA:</strong> "Browse Local Events."</p>
      <p style={{ margin: '6px 0 0' }}>Header carries a quiet <code>For organizers →</code> link. That's the entire organizer surface area on this page.</p>
    </div>

    <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: '12px 14px', marginBottom: 14 }}>
      <div style={{ fontWeight: 800, fontSize: 12, marginBottom: 4 }}>sparked.app/for-organizers  <span style={{ color: '#806a4e', fontWeight: 600 }}>(b2b page)</span></div>
      <p style={{ margin: 0 }}><strong>Audience:</strong> organizers. <strong>One primary CTA:</strong> "List Your First Event."</p>
      <p style={{ margin: '6px 0 0' }}>Full pitch lives here: pricing tiers, reach numbers, workspace screenshots. None of it competes with consumer copy.</p>
    </div>

    <h3>Why this beats "two CTAs on home"</h3>
    <ul>
      <li><strong>Each page does its best work.</strong> A consumer page that's half organizer-pitch confuses both audiences.</li>
      <li><strong>Conversion is measurable.</strong> Two URLs = two funnels. Today you can't tell whether "List an Event" is poaching consumer clicks.</li>
      <li><strong>You can run separate ads.</strong> Instagram targeting locals → home URL. LinkedIn targeting venue owners → /for-organizers.</li>
      <li><strong>Fixes the hierarchy backwards.</strong> Your gradient CTA today is the organizer one, but ~95% of visitors are consumers. The math is upside-down.</li>
    </ul>

    <h3>What to actually do this week</h3>
    <ol style={{ fontSize: 13, lineHeight: 1.65, paddingLeft: 18, margin: '0 0 14px' }}>
      <li>Replace the dual-CTA stack on home with one primary "Browse Local Events," plus a small <code>For organizers →</code> link in the header.</li>
      <li>Add a <code>/for-organizers</code> route. Move the entire organizer pitch (pricing tiers, list-an-event flow, testimonials) there.</li>
      <li>Both pages share the same brand: Spark gradient, Montserrat Black, eyebrow microcopy, ambient glows. They just serve different goals.</li>
    </ol>
    <p style={{ fontSize: 12.5, fontStyle: 'italic', color: '#5a4a36', margin: 0 }}>
      The five variations to the right all assume this single-audience model. They explore different ways to land the consumer story - pick the premise that feels right and we'll fold in the organizer entry consistently.
    </p>
  </div>
);

const VariationsNote = () => (
  <div className="note" data-screen-label="01 Variations · how to compare">
    <h2>Five mobile-first directions</h2>
    <p className="lead">
      Each is a deliberately different bet. Pick the one whose <em>premise</em> feels right; we can swap visuals later.
    </p>

    <h3>V1 - Discovery first</h3>
    <p>Lead with a live count and a faux map. Browse is primary; organizer entry is a quiet footer line. Best if your goal is consumer adoption above all.</p>

    <h3>V2 - Tonight's pick</h3>
    <p>One curated event fills the viewport like a magazine cover. Hooks the user with a specific real thing happening soon. Best if you have editorial bandwidth or AI-pick logic.</p>

    <h3>V3 - This week, near you</h3>
    <p>Anti-algorithm positioning, on-brand H1 ("YOUR CITY. YOUR EVENTS."), swipeable strip of real events near you, and a category index for the week. Brand color lives only on the logo + CTA - the H1 is flat white. Best if you want the home page to feel like the product itself, not marketing copy.</p>

    <h3>V4 - Live now (stories)</h3>
    <p>Borrows the Instagram-stories pattern - organizer logos with live rings up top, feed below. Best if you want to feel social and real-time. Risk: trains users to scroll, not to filter.</p>

    <h3>V5 - Two doors</h3>
    <p>Explicitly splits audiences in the first viewport: a consumer card on top, an organizer card below. <em>Only pick this if you reject the separate-page recommendation</em> - it's the strongest single-page compromise, but compromise is what it is.</p>

    <h3>If I had to pick one <span className="tag tag-keep">PICK</span></h3>
    <p style={{ margin: 0 }}><strong>V3 (This week, near you).</strong> You picked this one - it commits to the anti-algorithm positioning, uses the brand H1 honestly (no "curated" overclaim), shows real events via the swipeable strip, and reserves brand color for the CTA. The category index gives breadth without an infinite feed.</p>
  </div>
);

const AuthFeedbackNote = () => (
  <div className="note" data-screen-label="02 Auth · feedback">
    <h2>Sign-in screen - what changed</h2>
    <p className="lead">
      The brand work was strong. The structure was the issue. Here's what's in the "Suggested" rendering to the right - all your calls.
    </p>

    <h3>Changes locked in <span className="tag tag-fix">DONE</span></h3>
    <ul>
      <li><strong>Magic-link gradient: gone.</strong> Continue with Google is the only filled gradient CTA. Magic link survives as a plain text link below it - present, not competing for the eye. One primary action per screen.</li>
      <li><strong>Headline rewritten.</strong> "Welcome back - let's spark" → <code>"Your city. Your preferences."</code> with a short blurb about jumping straight to the interests and activities you care about. Reads like a value prop, not a salutation - useful for the first-time visitor who arrives at this screen from a sign-up link.</li>
      <li><strong>Benefit cards dropped.</strong> Going with the "let the product peek do the work" route - the faded event behind the auth card <em>is</em> the value prop. Six bullet points of copy on a sign-in screen was tax.</li>
      <li><strong>Em-dash → hyphen.</strong> Applied throughout this canvas per your call.</li>
    </ul>

    <h3>What's still working <span className="tag tag-keep">KEEP</span></h3>
    <ul>
      <li>Ambient coral + gold glows behind the surface - signature Sparked atmosphere.</li>
      <li>Single primary CTA (Google), single quiet alternative (magic link). Clear hierarchy.</li>
      <li>A real event peeks through the top of the screen - the user sees what they're signing into.</li>
    </ul>
  </div>
);

const VisualFeedbackNote = () => (
  <div className="note" data-screen-label="03 Visual · feedback">
    <h2>Visual design - brand-level principles</h2>
    <p className="lead">
      You're right to push back - the landing-page work happens in section 01. These are <strong>brand-level disciplines</strong> that apply to <em>every</em> Sparked surface (landing, auth, explore, event detail, workspace). Two demos to the right show each principle in isolation.
    </p>

    <h3>What's working <span className="tag tag-keep">KEEP</span></h3>
    <ul>
      <li>The 135° coral → orange → gold gradient as a single signature. Distinctive and consistently applied.</li>
      <li>The eyebrow microcopy pattern (10px, 900 weight, 0.20em tracking, orange). It's the connective tissue of the brand.</li>
      <li>Type discipline: Montserrat Black for display, Inter 500–900 for everything else.</li>
      <li>Radius scale (24–48px on most surfaces) and the warm-glow shadow treatment. Reads premium without trying too hard.</li>
    </ul>

    <h3>Principle 1 - Gradient discipline <span className="tag tag-fix">RULE</span></h3>
    <p>Today the spark gradient appears on: the logo, the H1 middle line, the primary CTA, the active pill, the 2px top-bar on feature cards, the 4px left bar on the About section, and the 1px stroke around auth buttons. Voice doc says the gradient should mark <em>actionable elements only</em> - but right now it's everywhere.</p>
    <p><strong>Reserve the gradient for three things only:</strong></p>
    <ol style={{ fontSize: 13, lineHeight: 1.6, paddingLeft: 18, margin: '0 0 10px' }}>
      <li>The <strong>wordmark</strong> (logo lockup).</li>
      <li>The <strong>primary CTA</strong> - one per screen.</li>
      <li>The <strong>currently-active state</strong> (selected pill, current tab, "Recommended" badge).</li>
    </ol>
    <p>Remove gradient from: feature-card top bars, About-section left bars, decorative dividers, hover halos, eyebrow accents, and headline-word emphasis on every page. <em>See the before/after to the right.</em></p>

    <h3>Principle 2 - Two-line headline, "no algorithm" in eyebrow <span className="tag tag-keep">DECIDED</span></h3>
    <p>The H1 drops to two lines: "YOUR CITY. / YOUR EVENTS." "No algorithm" moves up into the eyebrow microcopy alongside the location ("TONIGHT IN PHOENIX · NO ALGORITHM"). Still front-and-center, no longer a faded H1 line at 1.3:1 contrast. <em>See the placement to the right - both Option B (sub-line) and Option C (chip) were considered and skipped.</em></p>

    <h3>One observation, not a fix <span className="tag tag-question">CONSIDER</span></h3>
    <p>Sparked uses no photography on marketing surfaces - everything is gradient + type. Defensible choice (stays brand-consistent without a content team), but it means visitors never see a real event before being asked to act. The V1–V5 variations in section 01 all bring photography in - if you pick any of them, this is already handled.</p>
  </div>
);

const ContrastDemo = () => (
  <div className="note" data-screen-label="03c Contrast">

    <h3>✓ Going with this <span className="tag tag-keep">SELECTED</span></h3>

      <div style={{ color: '#fff', fontSize: 28 }}>YOUR CITY.</div>
